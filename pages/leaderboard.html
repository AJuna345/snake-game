<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UNCAFFEINATED - Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/game.css" rel="stylesheet">
</head>
<body class="theme-classic">
    <header class="py-4 bg-light border-bottom text-center">
        <h1 class="display-5 fw-bold">TOP SCORES</h1>
        <nav class="mt-3">
            <a href="../index.html" class="btn btn-outline-dark">Back to Game</a>
        </nav>
    </header>

    <main class="container mt-5">
        <table class="table table-striped table-hover shadow">
            <thead class="table-dark">
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
        <div class="text-center mt-4">
            <button id="clearBtn" class="btn btn-danger btn-sm">Clear All Scores</button>
        </div>
    </main>

    <script src="../scripts/leaderboard.js"></script>
</body>
</html>
