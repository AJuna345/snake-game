<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCAFFEINATED - Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/game.css" rel="stylesheet">
    
    <style>
        /* Forces the Bootstrap table to use your custom theme variables */
        .table-theme {
            color: var(--text-color);
            border-color: var(--border-color);
        }
        .table-theme thead th {
            background-color: var(--border-color);
            color: var(--canvas-bg);
            border-color: var(--border-color);
            font-family: 'Press Start 2P', 'Courier New', monospace; /* Arcade feel for headers */
            font-size: 12px;
            padding: 15px;
        }
        .table-theme tbody td {
            background-color: var(--canvas-bg);
            color: var(--text-color);
            border-color: var(--border-color);
            vertical-align: middle;
        }
    </style>
</head>
<body class="theme-classic">

    <script>
        const savedTheme = localStorage.getItem('snakeTheme') || 'classic';
        document.body.className = `theme-${savedTheme}`;
    </script>

    <header class="py-4 border-bottom">
        <div class="text-center mb-4">
            <div class="d-flex justify-content-center align-items-center gap-3">
                <h1 class="display-5 fw-bold site-title m-0">UNCAFFEINATED SNAKE GAME</h1>
            </div>
            <p class="text-muted fst-italic mt-2 mb-0">Now with more snake</p>
        </div>
        <nav>
            <ul class="d-flex justify-content-center gap-4 list-unstyled mb-0 fw-semibold">
                <li><a href="how-play.html" class="text-decoration-none header-link">How to play</a></li>
                <li><a href="../index.html" class="text-decoration-none header-link">Play/Rest</a></li>
                <li><a href="leaderboard.html" class="text-decoration-none header-link">Dev Profile</a></li>
                <li><a href="leaderboard.html" class="text-decoration-none header-link">Leaderboard</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="card-title fw-bold text-center mb-4">TOP SCORES</h2>
                        
                        <div class="table-responsive">
                            <table class="table table-bordered table-theme text-center mb-0">
                                <thead>
                                    <tr>
                                        <th>Rank</th>
                                        <th>Player</th>
                                        <th>Score</th>
                                    </tr>
                                </thead>
                                <tbody id="leaderboard-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button id="clearBtn" class="arcade-button" style="font-size: 14px; padding: 10px 20px;">Clear All Scores</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-5 pt-4 border-top text-center">
        <div class="d-flex justify-content-center gap-3">
            <a href="https://github.com/AJuna345/snake-game" target="_blank" class="btn btn-outline-secondary btn-sm">
                Game Repository on GitHub
            </a>
            <a href="https://github.com/AJuna345" target="_blank" class="btn btn-outline-secondary btn-sm">
                GitHub Profile
            </a>
            <a href="https://ajuna345.github.io/AJuna345/" target="_blank" class="btn btn-outline-secondary btn-sm"> 
                Dev Profile 
            </a>
        </div>
    </footer>

    <script src="../scripts/leaderboard.js"></script>
</body>
</html>
