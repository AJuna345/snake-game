<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple JavaScript Snake Game</title>
    <style>
        /* CSS Variables for the Theme Changer */
        :root {
            --bg-color: #f4f4f4;
            --text-color: #333;
            --snake-color: #28a745; /* Green */
            --canvas-bg: #fff;
            --border-color: #009BFF;
        }

        body.theme-dark {
            --bg-color: #222222;
            --text-color: #ffffff;
            --snake-color: #8e4fd6; /* Purple */
            --canvas-bg: #111;
            --border-color: #8e4fd6;
        }

        body.theme-neon {
            --bg-color: #000000;
            --text-color: #00ffff;
            --snake-color: #ff00ff; /* Pink */
            --canvas-bg: #000;
            --border-color: #00ffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: Arial, sans-serif;
            text-align: center; 
        }

        canvas {
            display: block;
            position: absolute;
            border: 5px solid var(--border-color);
            background-color: var(--canvas-bg);
            margin: auto;
            top: 150px; 
            bottom: 0;
            right: 0;
            left: 0;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        /* Settings Menu Styling */
        .game-settings {
            margin: 20px auto;
            padding: 15px;
            border: 2px solid var(--border-color);
            display: inline-block;
            border-radius: 8px;
            text-align: left;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            font-family: Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameOverScreen h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--border-color);
        }

        #restartBtn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--border-color);
            color: white;
            border: none;
            border-radius: 5px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

</html>
