<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCAFFEINATED - Snake Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Theme CSS Variables */
        :root, body.theme-classic {
            --bg-color: #ecf0f1;
            --text-color: #333333;
            --snake-color: #28a745;
            --canvas-bg: #ffffff;
            --border-color: #333333;
        }

        body.theme-dark {
            --bg-color: #222222;
            --text-color: #ffffff;
            --snake-color: #8e4fd6;
            --canvas-bg: #111111;
            --border-color: #8e4fd6;
        }

        body.theme-neon {
            --bg-color: #000000;
            --text-color: #00ffff;
            --snake-color: #ff00ff;
            --canvas-bg: #000000;
            --border-color: #00ffff;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            margin: 0;
            padding-bottom: 50px;
        }

        .arcade-button {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            border: 4px solid #c0392b;
            box-shadow: 0px 6px 0px #c0392b;
            transition: all 0.1s;
            margin-top: 20px;
            cursor: pointer;
        }

        .arcade-button:active {
            box-shadow: 0px 0px 0px #c0392b;
            transform: translateY(6px);
        }

        .arcade-button:hover {
            background-color: #ff5e4d;
            color: white;
        }

        .game-settings {
            margin: 20px auto;
            padding: 15px;
            background-color: var(--canvas-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        canvas {
            display: block;
            margin: 20px auto;
            border: 5px solid var(--border-color);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: border-color 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        #gameOverScreen {
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            border: 2px solid #ff4444;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body class="theme-classic">

 <body>

    <header class="py-4 bg-light border-bottom">
        <div class="text-center mb-4">
            <div class="d-flex justify-content-center align-items-center gap-3">
                <h1 class="display-5 fw-bold site-title m-0">UNCAFFEINATED SNAKE GAME</h1>
            </div>
            <p class="text-muted fst-italic mt-2 mb-0">Now with more snake</p>
        </div>
        <nav>
            <ul class="d-flex justify-content-center gap-4 list-unstyled mb-0 fw-semibold">
                <li><a href="pages/how-play.html" class="text-dark text-decoration-none">How to play</a></li>
                <li><a href="index.html" class="text-dark text-decoration-none">Play/Rest</a></li>
                <li><a href="pages/my-work.html" class="text-dark text-decoration-none">Dev Profile</a></li>
                <li><a href="pages/leaderboard.html" class="text-dark text-decoration-none">Leaderboard</a></li>
            </ul>
        </nav>
    </header>

</body>

    <div id="startScreen" style="margin: 60px auto;">
        <h2>Ready to Play?</h2>
        <button id="startBtn" class="arcade-button" style="background-color: #28a745; border-color: #1e7e34; box-shadow: 0px 6px 0px #1e7e34;">START GAME</button>
    </div>

    <div id="game-section" class="hidden" style="margin-top: 20px;">
        <div class="game-settings">
            <div style="margin-bottom: 10px;">
                <label for="playerName"><strong>Player Name:</strong></label>
                <input type="text" id="playerName" placeholder="Enter your name">
                <button id="saveNameBtn" style="background-color: #8e4fd6; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Save</button>
                <span id="greetingMessage" style="margin-left: 10px; font-weight: bold;"></span>
            </div>
            
            <div>
                <label for="themeSelect"><strong>Select Theme:</strong></label>
                <select id="themeSelect">
                    <option value="classic">Classic Green</option>
                    <option value="dark">Dark Mode</option>
                    <option value="neon">Neon</option>
                </select>
            </div>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1 style="color: #ff4444;">GAME OVER</h1>
            <p>Final Score: <span id="finalScore" style="font-weight: bold; font-size: 1.2rem;">0</span></p>
            <button id="restartBtn" class="arcade-button" style="margin-top: 10px;">Play Again</button>
        </div>
    </div>
    <script src="scripts/game.js"></script>
</body>
</html>
