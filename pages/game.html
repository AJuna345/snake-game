<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple JavaScript Snake Game</title>
    <style>
        body {
            background-color: #2c3e50; /* Added dark background to page */
        }
        canvas {
            display: block;
            position: absolute;
            border: 5px solid #009BFF;
            background-color: #fff;
            margin: auto;
            top: 0;
            bottom: 0;
            right: 0;
            left: 0;
        }
        
        /* MOVED THESE STYLES INSIDE THE <style> TAG */
        #gameOverScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(44, 62, 80, 0.85);
            color: white;
            font-family: Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameOverScreen h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #009BFF;
        }

        #restartBtn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #009BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #restartBtn:hover {
            background-color: #007acc;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    
    <div id="gameOverScreen" class="hidden">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Play Again</button>
    </div>

<script>
    // 1. Setup Constants and Variables
    var COLS = 26,
        ROWS = 26,
        EMPTY = 0,
        SNAKE = 1,
        FRUIT = 2,
        LEFT  = 0,
        UP    = 1,
        RIGHT = 2,
        DOWN  = 3,
        KEY_LEFT  = 37,
        KEY_UP    = 38,
        KEY_RIGHT = 39,
        KEY_DOWN  = 40,
        canvas,
        ctx,
        keystate,
        frames,
        score,
        isGameOver; // ADDED: Variable to track game state

    // 2. The Grid System
    var grid = {
        width: null,
        height: null,
        _grid: null,

        init: function(d, c, r) {
            this.width = c;
            this.height = r;
            this._grid = [];
            for (var x = 0; x < c; x++) {
                this._grid.push([]);
                for (var y = 0; y < r; y++) {
                    this._grid[x].push(d);
                }
            }
        },

        set: function(val, x, y) {
            this._grid[x][y] = val;
        },

        get: function(x, y) {
            return this._grid[x][y];
        }
    };

    // 3. The Snake Object
    var snake = {
        direction: null,
        last: null,
        _queue: null,

        init: function(d, x, y) {
            this.direction = d;
            this._queue = [];
            this.insert(x, y);
        },

        insert: function(x, y) {
            this._queue.unshift({x: x, y: y});
            this.last = this._queue[0];
        },

        remove: function() {
            return this._queue.pop();
        }
    };

    // 4. Food Generator
    function setFood() {
        var empty = [];
        for (var x = 0; x < grid.width; x++) {
            for (var y = 0; y < grid.height; y++) {
                if (grid.get(x, y) === EMPTY) {
                    empty.push({x: x, y: y});
                }
            }
        }
        var randpos = empty[Math.floor(Math.random() * empty.length)];
        grid.set(FRUIT, randpos.x, randpos.y);
    }

    // 5. Main Setup
    function main() {
        canvas = document.createElement("canvas");
        canvas.width = COLS * 20;
        canvas.height = ROWS * 20;
        ctx = canvas.getContext("2d");
        document.body.appendChild(canvas);

        ctx.font = "12px Helvetica";

        frames = 0;
        keystate = {};

        document.addEventListener("keydown", function(evt) {
            keystate[evt.keyCode] = true;
        });
        document.addEventListener("keyup", function(evt) {
            delete keystate[evt.keyCode];
        });

        init();
        loop();
    }

    // 6. Game Initialization
    function init() {
        isGameOver = false; // ADDED: Reset game over state
        score = 0;
        grid.init(EMPTY, COLS, ROWS);
        var sp = {x: Math.floor(COLS/2), y: ROWS-1};
        snake.init(UP, sp.x, sp.y);
        grid.set(SNAKE, sp.x, sp.y);
        setFood();
    }

    // 7. The Game Loop
    function loop() {
        // ADDED: Only update and draw if the game is NOT over
        if (!isGameOver) {
            update();
            draw();
        }
        window.requestAnimationFrame(loop, canvas);
    }

    // 8. Update Logic
    function update() {
        frames++;

        if (keystate[KEY_LEFT] && snake.direction !== RIGHT) {
            snake.direction = LEFT;
        }
        if (keystate[KEY_UP] && snake.direction !== DOWN) {
            snake.direction = UP;
        }
        if (keystate[KEY_RIGHT] && snake.direction !== LEFT) {
            snake.direction = RIGHT;
        }
        if (keystate[KEY_DOWN] && snake.direction !== UP) {
            snake.direction = DOWN;
        }

        if (frames % 7 === 0) {
            var nx = snake.last.x;
            var ny = snake.last.y;

            switch (snake.direction) {
                case LEFT: nx--; break;
                case UP: ny--; break;
                case RIGHT: nx++; break;
                case DOWN: ny++; break;
            }

            // ADDED: New Game Over trigger logic
            if (0 > nx || nx > grid.width-1 || 0 > ny || ny > grid.height-1 || grid.get(nx, ny) === SNAKE) {
                isGameOver = true; // Stop the loop
                document.getElementById("finalScore").innerText = score; // Update score on screen
                document.getElementById("gameOverScreen").classList.remove("hidden"); // Show screen
                return; // Exit the update block
            }

            if (grid.get(nx, ny) === FRUIT) {
                score++;
                setFood();
            } else {
                var tail = snake.remove();
                grid.set(EMPTY, tail.x, tail.y);
            }

            grid.set(SNAKE, nx, ny);
            snake.insert(nx, ny);
        }
    }

    // 9. Draw Everything
    <div class="game-settings" style="margin-bottom: 20px;">
    <div>
        <label for="playerName"><strong>Player Name:</strong></label>
        <input type="text" id="playerName" placeholder="Enter your name">
        <button id="saveNameBtn" class="btn btn-sm" style="background-color: #8e4fd6; color: white;">Save</button>
        <span id="greetingMessage" style="margin-left: 10px; font-weight: bold;"></span>
    </div>
    
    <div style="margin-top: 10px;">
        <label for="themeSelect"><strong>Select Theme:</strong></label>
        <select id="themeSelect">
            <option value="classic">Classic Green</option>
            <option value="dark">Dark Mode</option>
            <option value="neon">Neon</option>
        </select>
    </div>
</div>
    function draw() {
        var tw = canvas.width / grid.width;
        var th = canvas.height / grid.height;

        for (var x = 0; x < grid.width; x++) {
            for (var y = 0; y < grid.height; y++) {
                switch (grid.get(x, y)) {
                    case EMPTY: ctx.fillStyle = "#fff"; break;
                    case SNAKE: ctx.fillStyle = "#333"; break;
                    case FRUIT: ctx.fillStyle = "#009BFF"; break;
                }
                ctx.fillRect(x * tw, y * th, tw, th);
            }
        }

        ctx.fillStyle = "#000";
        ctx.fillText("SCORE: " + score, 10, canvas.height - 10);
    }

    // ADDED: Restart button event listener
    document.getElementById("restartBtn").addEventListener("click", function() {
        document.getElementById("gameOverScreen").classList.add("hidden"); // Hide screen
        init(); // Restart game
    });

    // Start the game
    main();
</script>
</body>
</html>
