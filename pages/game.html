<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple JavaScript Snake Game</title>
    <style>
        /* CSS Variables for the Theme Changer */
        :root {
            --bg-color: #f4f4f4;
            --text-color: #333;
            --snake-color: #28a745; /* Green */
            --canvas-bg: #fff;
            --border-color: #009BFF;
        }

        body.theme-dark {
            --bg-color: #222222;
            --text-color: #ffffff;
            --snake-color: #8e4fd6; /* Purple */
            --canvas-bg: #111;
            --border-color: #8e4fd6;
        }

        body.theme-neon {
            --bg-color: #000000;
            --text-color: #00ffff;
            --snake-color: #ff00ff; /* Pink */
            --canvas-bg: #000;
            --border-color: #00ffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: Arial, sans-serif;
            text-align: center; 
            margin: 0;
            padding-top: 20px;
        }

        canvas {
            display: block;
            position: absolute;
            border: 5px solid var(--border-color);
            background-color: var(--canvas-bg);
            margin: auto;
            top: 150px; 
            bottom: 0;
            right: 0;
            left: 0;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }

        /* Settings Menu Styling */
        .game-settings {
            margin: 0 auto 20px auto;
            padding: 15px;
            border: 2px solid var(--border-color);
            display: inline-block;
            border-radius: 8px;
            text-align: left;
            background-color: var(--canvas-bg);
            transition: all 0.3s ease;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            font-family: Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameOverScreen h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--border-color);
        }

        #restartBtn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            background-color: var(--border-color);
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }

        #restartBtn:hover {
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="game-settings">
        <label for="themeSelect" style="font-weight: bold;">Select Theme:</label>
        <select id="themeSelect">
            <option value="classic">Classic Green</option>
            <option value="dark">Dark Mode</option>
            <option value="neon">Neon</option>
        </select>
        <span style="margin-left: 20px; font-weight: bold;">Score: <span id="currentScore">0</span></span>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="gameOverScreen" class="hidden">
        <h1>GAME OVER</h1>
        <p style="font-size: 1.5rem;">Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">Play Again</button>
    </div>

    <script>
        // Game Constants & Variables
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let snakeLength = 3;
        let foodX = 10;
        let foodY = 10;
        let velocityX = 0;
        let velocityY = 0;
        let score = 0;
        let isGameOver = false;
        let gameLoop;

        // UI Elements
        const currentScoreEl = document.getElementById("currentScore");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const finalScoreEl = document.getElementById("finalScore");
        const restartBtn = document.getElementById("restartBtn");
        const themeSelect = document.getElementById("themeSelect");

        // Start Game
        function initGame() {
            snake = [];
            snakeLength = 3;
            score = 0;
            velocityX = 0;
            velocityY = 0;
            isGameOver = false;
            
            // Start snake in the middle
            snake.push({x: Math.floor(tileCount/2), y: Math.floor(tileCount/2)});
            
            placeFood();
            gameOverScreen.classList.add("hidden");
            currentScoreEl.innerText = score;
            
            clearInterval(gameLoop);
            gameLoop = setInterval(update, 1000 / 10); // 10 FPS
        }

        function update() {
            if (isGameOver) return;

            // Move Snake
            let headX = snake[0].x + velocityX;
            let headY = snake[0].y + velocityY;

            // Wall Collision
            if (headX < 0 || headX >= tileCount || headY < 0 || headY >= tileCount) {
                gameOver();
                return;
            }

            // Self Collision (Only check if moving)
            if (velocityX !== 0 || velocityY !== 0) {
                for (let i = 0; i < snake.length; i++) {
                    if (headX === snake[i].x && headY === snake[i].y) {
                        gameOver();
                        return;
                    }
                }
            }

            snake.unshift({x: headX, y: headY});

            // Food Collision
            if (headX === foodX && headY === foodY) {
                score++;
                currentScoreEl.innerText = score;
                placeFood();
            } else {
                // Remove tail if no food eaten
                while (snake.length > snakeLength) {
                    snake.pop();
                }
            }

            draw();
        }

        function draw() {
            // Get current theme colors from CSS variables
            const style = getComputedStyle(document.body);
            const canvasBg = style.getPropertyValue('--canvas-bg').trim() || '#fff';
            const snakeColor = style.getPropertyValue('--snake-color').trim() || '#28a745';
            
            // Clear Canvas
            ctx.fillStyle = canvasBg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            ctx.fillStyle = snakeColor;
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }

            // Draw Food (Red)
            ctx.fillStyle = "#ff4444";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);
        }

        function placeFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            
            // Make sure food doesn't spawn on the snake
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === foodX && snake[i].y === foodY) {
                    placeFood();
                    break;
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove("hidden");
        }

        // Input Handling
        document.addEventListener("keydown", function(event) {
            // Prevent default scrolling for arrow keys
            if ([37, 38, 39, 40].includes(event.keyCode)) {
                event.preventDefault();
            }

            if (event.keyCode === 37 && velocityX !== 1) { // Left
                velocityX = -1; velocityY = 0;
            } else if (event.keyCode === 38 && velocityY !== 1) { // Up
                velocityX = 0; velocityY = -1;
            } else if (event.keyCode === 39 && velocityX !== -1) { // Right
                velocityX = 1; velocityY = 0;
            } else if (event.keyCode === 40 && velocityY !== -1) { // Down
                velocityX = 0; velocityY = 1;
            }
        });

        restartBtn.addEventListener("click", initGame);

        // Theme Switcher Logic
        themeSelect.addEventListener("change", (e) => {
            document.body.className = ''; // clear classes
            if (e.target.value !== 'classic') {
                document.body.classList.add(`theme-${e.target.value}`);
            }
            draw(); // Redraw immediately so colors update even while paused
        });

        // Initialize Game on Load
        initGame();
        draw(); // Draw initial state
    </script>
</body>
</html>
