<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Arcade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ecf0f1;
            padding-top: 50px;
        }
        
        /* The CSS for the new Arcade Button */
        .arcade-button {
            display: inline-block;
            background-color: #e74c3c; /* Red background */
            color: white; /* White text */
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none; /* Removes the underline */
            border-radius: 8px; /* Rounds the corners */
            border: 4px solid #c0392b; /* Dark red border */
            box-shadow: 0px 6px 0px #c0392b; /* Creates the 3D bottom edge */
            transition: all 0.1s; /* Makes the click animation smooth */
            margin-top: 20px;
        }

        /* Makes the button physically "press down" when clicked */
        .arcade-button:active {
            box-shadow: 0px 0px 0px #c0392b;
            transform: translateY(6px);
        }
        
        /* Brightens the button when you hover your mouse over it */
        .arcade-button:hover {
            background-color: #ff5e4d;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>Press the button below to play the game</p>
    
    <a href="pages/game.html" class="arcade-button">Play the Snake Game</a>

</body>
